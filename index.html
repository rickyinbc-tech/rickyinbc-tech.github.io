<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://rickykwok.com/">
  <title>Ricky Kwok</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172026;
      --muted: #5f6b75;
      --line: #d8dee4;
      --bg: #f7f8f9;
      --paper: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(720px, calc(100vw - 40px));
      padding: 40px 0;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.2rem, 7vw, 4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 1rem;
    }

    .notice {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Ricky Kwok</h1>
    <p>Personal homepage.</p>
    <p class="notice">This site does not offer products, services, paid work, client work, investment advice, financial planning, portfolio management, research subscriptions, print sales, licensing, commissions, or commercial inquiries.</p>
  </main>
</body>
</html>
