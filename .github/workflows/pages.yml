name: Deploy static site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Build canonical sitemaps
        run: node .github/scripts/build-sitemaps.mjs
      - name: Build image and performance governance report
        run: node .github/scripts/build-governance-report.mjs
      - name: Validate site
        run: node .github/scripts/validate-site.mjs
      - name: Test edge routing and security headers
        run: node .github/scripts/test-edge-worker.mjs
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Notify participating search engines through IndexNow
        continue-on-error: true
        run: node .github/scripts/submit-indexnow.mjs
