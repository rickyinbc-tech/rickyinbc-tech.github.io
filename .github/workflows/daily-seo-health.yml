name: Daily SEO health report

on:
  schedule:
    - cron: "30 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-seo-health:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build SEO health report
        run: node .github/scripts/build-seo-health.mjs

      - name: Commit daily report
        run: |
          git config user.name "Codex SEO Monitor"
          git config user.email "codex-seo-monitor@users.noreply.github.com"
          git add seo-status/index.html seo-status/latest.json
          if git diff --cached --quiet; then
            echo "No SEO health changes to commit."
          else
            git commit -m "Update daily SEO health report"
            git push
          fi
