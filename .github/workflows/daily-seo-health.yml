name: Daily SEO health report

on:
  schedule:
    - cron: "30 13 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-seo-health:
    runs-on: ubuntu-latest
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build SEO health report
        run: node .github/scripts/build-seo-health.mjs

      - name: Upload diagnostic report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-health-${{ github.run_id }}
          path: seo-status/
          retention-days: 14
