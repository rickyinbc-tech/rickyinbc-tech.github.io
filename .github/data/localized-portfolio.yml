artworks:
  bank-of-china-light-trails:
    title: 中銀大廈光軌
    english: Bank of China Light Trails
    series: City Light
    summary: 雨水、交通與建築把香港夜景畫成一幅流動的電路圖。
    text: 長時間曝光把香港平日看不見的移動變成光線。中銀大廈保持清晰而垂直，巴士、街燈、雨痕與車流則在畫面上留下短暫軌跡。作品同時容納兩種時間：建築的持續存在，以及交通一閃即逝的速度；城市的密度、反光與公共運輸因而成為畫面的真正結構。
  blue-column:
    title: 藍色水柱
    english: Blue Column
    series: Collision
    summary: 水在回落之前短暫站立，成為一道藍色雕塑。
    text: 高速攝影把重力尚未抹去的水形固定下來。狹長水柱頂端承托圓形水滴，既像抽象雕塑，也帶有近似人物姿態的性格。單一藍色背景消除干擾，讓觀者看見液體的不規則表面、體積與短暫平衡；控制與偶然在同一瞬間共存。
  blue-hour-river-stage:
    title: 藍調時刻・河上舞台
    english: Blue Hour, River Stage
    series: Ritual
    summary: 竹筏、鸕鶿、水面與燈火在藍調時刻形成安靜的河上舞台。
    text: 竹筏停在平靜水面，鸕鶿守在前景，漁火在深藍暮色中留下暖色光點。這並非搭建的戲劇，而是相機在真實勞動中辨認出的儀式感：竹筏像舞台，水面像反光地板，人與鳥共同維持一種逐漸消失的生活節奏。
  breaking-point:
    title: 破裂臨界
    english: Breaking Point
    series: Collision
    summary: 蛋殼與液體在破裂一刻形成脆弱而猛烈的建築。
    text: 蛋由封閉形體轉為向外爆開的碎片、液體與透明薄膜。高速攝影把「仍然可辨認」與「已經瓦解」之間的界線保存下來，讓一件日常物件獲得近乎紀念碑的尺度。作品談的不是混亂結果，而是容納與釋放之間那個肉眼無法停留的臨界點。
  coil-field:
    title: 線圈之田
    english: Coil Field
    series: Ritual
    summary: 重複的線圈與勞動，把工地轉化成一片圓形田野。
    text: 圓形線圈以規律方式鋪滿畫面，一名工人彎身置於圖案之中。黑白處理把注意力由色彩移向形狀、尺度與勞動，使實際工序同時成為抽象構圖。人的存在阻止圖案變成無名裝飾：每一個圓形仍然由身體製作、整理和照料。
  color-burst:
    title: 色彩爆發
    english: Color Burst
    series: Collision
    summary: 紅、黃、綠粉末把衝擊的方向與力度化成可見色彩。
    text: 三組粉末爆開，各自具有不同密度、方向與節奏，令黑色背景成為純粹色彩力量的舞台。作品把 Collision 系列由水、灰燼與蛋殼延伸到顏料；它看似接近繪畫，能量卻完全依賴相機停止時間的能力。歡愉與暴烈在同一個臨時色彩雕塑內並存。
  cranes-and-towers:
    title: 吊臂與高樓
    english: Cranes and Towers
    series: City Light
    summary: 吊臂、天際線與前景圍欄，把香港壓縮成黑白結構。
    text: 前景直條阻隔維港天際線，逼使觀者穿過障礙觀看吊臂、高樓與遠景。黑白處理拿走霓虹的誘惑，留下鋼材、建造、勞動與受限制的視線。作品拒絕提供毫無阻隔的明信片景觀，反而令城市密度本身成為觀看條件。
  dragon-night-festival:
    title: 火龍之夜
    english: Dragon Night Festival
    series: Ritual
    summary: 火龍巡遊把煙、街道、觀眾與暖光聚合成一個公共儀式場。
    text: 火龍在香港街道的人群中穿行，煙霧、暖光、建築與身體一同移動。作品同時屬於 Ritual 與 City Light：它既記錄公共傳統，也研究都市光線和集體節奏。群眾不是背景，而是令整個儀式具有壓力、尺度與現場感的部分。
  fishpond-harvest:
    title: 漁獲
    english: Fishpond Harvest
    series: Documentary
    summary: 工人、漁網與水面共同構成香港魚塘收魚的勞動現場。
    text: 作品記錄傳統魚塘收成，也把魚塘視為生產景觀與濕地生境。香港觀鳥會公布的比賽結果把《漁獲》列為學生風景組冠軍；同一組項目另有風景組亞軍、生態組冠軍及生態組季軍。作品頁把影像、保育背景與可核實的機構紀錄放在同一脈絡內。
  flower-impact:
    title: 花之衝擊
    english: Flower Impact
    series: Collision
    summary: 花朵在仍可辨認之際，已裂成花瓣、粉塵與黑色空間。
    text: 柔軟花朵與猛烈衝擊形成作品的核心張力。散落微粒不是附帶效果，而是時間由破裂點向外擴張的證據。拍攝控制精確，主體卻保持脆弱；美感與損毀因此無法分開，令技術實驗具有情緒重量。
  green-orb:
    title: 綠色星體
    english: Green Orb
    series: Collision
    summary: 一滴水成為懸在重力與設計之間的小型星體。
    text: 深色水滴由液面升起，在飽和綠色場域中形成極簡形體。作品依賴精準時機，但力量來自節制：沒有龐大水花，只有上升與塌下之間的停頓。細小水柱仍把圓球連回液體物理，而綠色不只是背景，更是氣氛、舞台與視覺壓力。
  ice-crown:
    title: 冰冠
    english: Ice Crown
    series: Collision
    summary: 水花在拳手頭上形成一頂只存在一瞬間的冠冕。
    text: 拳套在下方建立張力，爆開的水則把運動肖像變成衝擊事件。人物表情提供人性強度，水花提供雕塑形態；作品不依賴擂台或比賽情節，也能呈現身體力量、表演與碰撞。暫時的水冠既帶幽默，也帶英雄式的直接感。
  light-encroached-homes:
    title: 光染民居
    english: Light Encroached Homes
    series: City Light
    summary: 旺角住宅、廣告招牌與夜空在魚眼視角內互相擠壓。
    text: 為參加香港大學光污染攝影比賽，我開始更仔細觀察香港夜間照明。走訪期間，我留意到大量廣告招牌貼近住宅，並思考居民在強光下休息的處境。我在旺角找到這個位置，以魚眼鏡頭由低角度同時容納招牌、樓宇與中央夜空。《光染民居》從154份參賽作品中獲選為冠軍，其後於香港太空館展出。
  magenta-collision:
    title: 洋紅碰撞
    english: Magenta Collision
    series: Collision
    summary: 液體在洋紅光線下變得濃密、帶有身體感和電流般能量。
    text: 不平整水柱充滿高光、折疊與細小氣泡，周圍懸浮水滴把一個瞬間向外延伸。飽和洋紅改變我們閱讀物質的方式：本來清澈的水變成近乎有機的形體。相機保存的不是水花之後，而是結構仍在決定自己形狀的過程。
  night-fishermen:
    title: 夜漁
    english: Night Fishermen
    series: Ritual
    summary: 河上勞動在燈火照明下成為短暫舞台。
    text: 兩名漁民各自提着發光燈具，背後山形逐漸消失於藍黑夜色。燈本來是實用工具，在照片中卻成為廣闊景觀內的暖色核心。人物並非扮演演員；相機只是辨認了勞動、魚、竹筏、器具與陰影本來已存在的戲劇性。
  orange-droplet:
    title: 橙色水滴
    english: Orange Droplet
    series: Collision
    summary: 下墜水滴與上升水峰在橙色場域內幾乎相遇。
    text: 接觸、塌下和濺開之前，一道極短距離把兩個液體形態分隔。這個空隙正是作品主體：重力、時機與期待在此變得可見。單一橙色帶來溫度和懸念，兩個形態則像彼此靠近的身體，使極簡畫面保持充足張力。
  shunkan-instant:
    title: 瞬間
    english: Shunkan / Instant
    series: Collision
    summary: 灰燼、煙霧與衝力在藍黑空間內爆開。
    text: 香煙裂成灰燼、煙霧與飛散碎片，在細小尺度上形成近乎宇宙的藍黑雲層。這不是生活方式影像，而是把破壞轉化為可見雕塑事件的研究。衝力橫越畫面，燃點與藍煙提供熱度、方向和空間；美感與不安同時存在，令一秒鐘成為有形證據。
  start-sequence:
    title: 起跳序列
    english: Start Sequence
    series: Motion
    summary: 多名泳手的起跳被壓縮成跨越泳線的下降節奏。
    text: 泳手在空中與入水之間形成連續弧線，紅色泳線、碧綠水面、身體與水花共同組成一段視覺樂句。作品沒有孤立某位運動員，而是把競賽轉化為序列、編舞與重複；畫面由上而下推進，最後一個身體在水中化成泡沫。
  street-procession:
    title: 街頭隊列
    english: Street Procession
    series: City Light
    summary: 真實行人與牆上人物共享同一個公共節奏。
    text: 行人沿牆前進，壁畫人物亦朝相同方向列隊，令街道成為現實身體與圖像交疊的巡遊。拍攝時機使兩者足夠接近，觀看者一度難以分清街景與藝術作品。黑白處理加強這種錯覺，也顯示城市劇場不只存在於霓虹與節慶。
  swimming-in-motion:
    title: 游動之間
    english: Swimming in Motion
    series: Motion
    summary: 競泳身體溶入層疊色彩、水花與速度節奏。
    text: 泳手化成皮膚、水與白色浪花的筆觸，泳線像樂譜橫切畫面並維持整體結構。模糊不是拍攝失誤，而是讓速度本身取代清晰輪廓成為主體。每名泳手留下的痕跡互相重疊，競賽仍然可辨，卻同時接近抽象繪畫。
  terraces-at-golden-hour:
    title: 金色時分的梯田
    english: Terraces at Golden Hour
    series: Ritual
    summary: 盛水梯田在暖光下化成由勞動塑造的發光地形圖。
    text: 重複曲線沿山坡展開，水面捕捉金色光線；細小人物則揭示景觀的尺度、勞動和生活節奏。作品把梯田同時視為美麗表面與長期人工作用的系統。金色光線柔化現場，人在層疊圖案中的移動仍然保存了土地的實際用途。
  the-pack:
    title: 馬群
    english: The Pack
    series: Motion
    summary: 賽馬轉彎時的擠迫、重量與速度被壓縮到最高密度。
    text: 馬匹與騎師在彎位互相逼近，泥土升起、彩衣閃動，欄杆以硬弧線限制前進空間。作品不靠模糊表達速度，而以身體距離、風險和壓力建立動感。節奏由馬蹄、色彩、塵土與爭奪位置的力量共同形成。

series:
  ritual:
    title: 儀式 Ritual
    dates: 紀實與文化作品
    summary: 我以節慶、勞動、河流生活與公共姿態為線索，尋找真實活動自然形成的儀式感。人物不是被安排成演員；燈火、煙霧、水面、重複動作與群眾關係，令日常現場成為一個可被仔細閱讀的舞台。
  collision:
    title: 碰撞 Collision
    dates: 高速攝影與攝影棚實驗
    summary: 我以高速攝影研究水、粉末、花、蛋殼、灰燼與其他物料在碰撞一刻形成的結構。技術的目的不是炫耀速度，而是讓肉眼看不清的壓力、裂變、懸浮與回落變成有形雕塑。
  motion:
    title: 動態 Motion
    dates: 運動、身體與節奏
    summary: 我把游泳、賽馬與運動身體視為節奏，而不只視為比賽紀錄。模糊、重複、擠迫與起跳次序，讓速度轉化為構圖；每張照片保留競技現場，同時把身體推向抽象語言。
  city-light:
    title: 城市之光 City Light
    dates: 香港夜間照明與都市密度
    summary: 香港的光不只是照明，也是公共空間、商業壓力、建築密度和生活條件。我從旺角招牌、車流光軌、天際線與街頭偶遇出發，觀看光線如何書寫城市，也如何越過住宅與公共生活的界線。

projects:
  hong-kong-light-pollution:
    title: 香港光污染攝影項目
    label: 環境項目・2014
    summary: 《光染民居》背後的拍攝過程、環境問題與公共機構紀錄。
    text: 為回應香港大學的光污染攝影比賽，我在香港街道尋找廣告照明與住宅最直接相遇的位置。旺角這個仰視角度讓密集招牌、住宅窗戶與中央夜空同時進入畫面；魚眼鏡頭不是裝飾效果，而是用來呈現光線如何由四周包圍民居。
    facts:
      - 香港大學光污染攝影比賽2014冠軍
      - 從154份參賽作品中獲選
      - 得獎作品其後於香港太空館展出
      - 拍攝地點：香港旺角；約晚上十時
  hong-kong-fishpond-conservation:
    title: 香港魚塘保育攝影項目
    label: 保育項目・2014紀錄
    summary: 由魚塘收成、濕地生境與勞動現場出發的四項公開得獎紀錄。
    text: 傳統魚塘同時是生產環境、文化景觀與濕地生境。這組照片以工人、漁網、水面、鳥類與休息片刻呈現魚塘內部的日常關係，而不是把保育化成抽象口號。香港觀鳥會公開結果把四張作品分別列入學生風景與生態組別。
    facts:
      - 學生風景組冠軍：《漁獲》
      - 學生風景組亞軍：《日出大生圍》
      - 學生生態組冠軍：《閒來休息》
      - 學生生態組季軍：《美食當前》
  nepal-documentary:
    title: 尼泊爾紀實攝影
    label: 紀實項目
    summary: 關於家庭、工作、街道生活與觀看責任的影像序列。
    text: 這個項目保留尼泊爾旅途中遇見的人物與日常場景。重新整理檔案時，我把準確說明、人物尊嚴與影像次序放在視覺效果之前；不清楚的地點、身份或情境不會被後來的想像補寫，紀實影像亦不應因時間久遠而失去倫理責任。
    facts:
      - 以人物、家庭、勞動與街道生活組成序列
      - 圖說只採用可由原始記錄支持的資料
      - 展覽、出版及授權需逐張確認影像背景與使用情境
  infrared-hong-kong:
    title: 香港紅外線攝影
    label: 實驗項目
    summary: 以紅外線色彩重新觀看園林、寺廟、石材與植物。
    text: 紅外線影像改變葉面、天空與建築材質的明暗關係，使熟悉的香港園林和寺廟呈現陌生色域。我把它視為觀看方法，而不是單純濾鏡：當自然與人造表面交換視覺重量，觀者會重新留意空間層次、光線方向與文化建築的質感。
    facts:
      - 主題包括園林、寺廟、植物與建築細節
      - 色彩來自紅外線拍攝與後期色彩詮釋
      - 個別影像的地點、製作方式與使用狀態按作品確認
  horse-riding:
    title: 賽馬與騎術攝影
    label: 動態項目
    summary: 由馬匹、騎師、轉彎與賽道壓力組成的速度研究。
    text: 我拍攝的不只是勝負，而是賽馬運動中身體與空間的關係：馬群在彎位壓縮、騎師調整重心、泥土升起、欄杆限制路線。部分作品以清晰細節呈現壓力，部分則以移動感建立節奏，讓香港賽馬文化同時保留紀實與形式研究兩種層面。
    facts:
      - 研究馬群密度、騎師姿態、色彩與速度
      - 動態模糊與凝結瞬間按畫面目的使用
      - 出版及商業使用需另行確認授權範圍
  travel:
    title: 中國紀實攝影研究
    label: 旅途與紀實項目
    summary: 在勞動、儀式、鄉村生活與地景之間建立的旅行影像序列。
    text: 這組照片由不同旅途累積而成，關心人如何在工作、家庭、儀式與土地之間生活。重新編輯時，我不把不同地區合成一個籠統故事，而按可確認的場景與視覺關係整理；未有充分資料的影像保留開放說明，避免替被攝者創作不屬於他們的背景。
    facts:
      - 主題包括勞動、儀式、鄉村生活與地景
      - 圖像次序按視覺關係與可核實資料整理
      - 展覽或出版會按項目重新核對圖說與使用情境

collections:
  monochrome-documentary:
    title: 黑白紀實作品
    summary: 以黑白抽走色彩誘惑，集中觀看勞動、建築、重複形態、公共空間與人物尺度。
  hong-kong-urban-light-studies:
    title: 香港都市光線研究
    summary: 從霓虹、車流、住宅、天際線與街頭影像，研究光如何塑造香港的密度與公共生活。
  sport-abstraction:
    title: 運動抽象研究
    summary: 游泳與賽馬被轉化為節奏、線條、色塊、擠迫和身體留下的短暫痕跡。
  studio-collision-studies:
    title: 攝影棚碰撞研究
    summary: 以高速攝影保存水、粉末、花、灰燼、蛋殼與物件在衝擊一刻的臨時結構。
  village-ritual-photography:
    title: 鄉村儀式攝影
    summary: 從節慶、勞動、河流生活與地方傳統，觀看真實活動如何自然形成具有儀式感的場景。

core:
  artist-statement:
    title: 藝術家自述
    label: 創作實踐
    summary: 我把瞬間視為一種材料：水成為雕塑、光成為壓力，人的動作則在真實生活中形成儀式。
    image: /assets/optimized-v2/art/cigarette-impact-1280.webp
    sections:
      - heading: 平常現實變得不穩定的一刻
        paragraphs:
          - 我關心日常現實突然轉化的瞬間。河上燈火成為舞台光，泳手溶入色彩，城市招牌成為環境壓力，一滴水變成雕塑。紀實觀察與攝影棚實驗看似不同，卻同樣揭示世界一直在轉化，只是通常快得令我們無法看清。
          - 在紀實影像中，我尋找那些不把自己宣告為表演的儀式。漁民在河上提燈、婦女圍着爐火、工人在水中收魚、群眾跟隨火龍穿過香港街道：它們是勞動、記憶和社群，同時亦包含劇場。煙、火、藍調時刻與手勢，就是現實生活自己的燈光系統。
      - heading: 壓力之下的時間
        paragraphs:
          - 在攝影棚作品中，主題是受壓的時間。水、灰燼、粉筆、花、蛋、粉末與火焰被推進只存在少於眨眼時間的形態。高速攝影讓不可見的間隔變成有形；這些作品不只關於撞擊，也關於破裂之中意外出現的優雅。
          - 香港仍然是實踐的視覺地面。夜間燈光、招牌、交通、密度與反光表面，令私人生活與公共亮度持續碰撞。《光染民居》對我重要，因為它在同一畫面直接容納美感與壓力。
      - heading: 四個系列，同一種帶電的時間
        paragraphs:
          - 在 Ritual、Collision、Motion 與 City Light 之間，我不斷回到帶有能量的時間。我希望照片不像事件的插圖，而像事件離開後留下的實體痕跡。
    links:
      - [閱讀四個攝影系列, /zh-hant/series/]
      - [瀏覽精選作品, /zh-hant/works/]
  contact/thanks:
    title: 查詢狀態
    label: 工作室查詢
    noindex: true
    summary: 只有在同一瀏覽器完成工作室表格後，本頁才會顯示可核實的查詢編號。
    image: /assets/optimized-v2/art/light-encroached-homes-1280.webp
    sections:
      - heading: 如未見查詢編號，請返回相應表格
        paragraphs:
          - 單獨開啟、收藏或分享確認頁網址，並不代表查詢已成功送達。完成提交後，頁面會顯示 Lead ID、查詢類型、作品或系列以及下一步；請保留編號作日後跟進。
          - 工作室目標在三個工作天內回覆，並可能先要求補充版數、展覽、權限、檔案或授權所需資料。提交表格本身並不是出售、預留、授權或複製圖片的許可。
          - 如出版或展覽期限在三個工作天內，請電郵 studio@rickykwok.com，並附上查詢編號與截止日期。
    links:
      - [返回聯絡表格, /zh-hant/contact/]
      - [圖片授權表格, "/zh-hant/licensing/#licensing-form"]
  journal:
    title: 攝影筆記
    label: 第一人稱工作記錄
    summary: 關於地點、拍攝方法、編輯決定，以及一張照片完成後仍未停止的問題。
    image: /assets/optimized-v2/art/light-encroached-homes-1280.webp
    sections:
      - heading: 完成的照片隱藏了大部分製作決定
        paragraphs:
          - 我用這些筆記回到畫框之外：如何找到位置、為何選擇某個角度、哪些嘗試失敗、編輯如何改變，以及今天重新觀看時有甚麼不同理解。機構紀錄或研究來源建立的事實，會與我的個人回憶分開標示。
          - 內容由香港都市光線、環境及紀實項目，延伸到動態、儀式與攝影棚碰撞。目的不是解釋每一張影像，而是保存令作品長期保持可讀性的證據與選擇。
      - heading: 由兩個香港項目開始
        paragraphs:
          - 《光染民居》記錄旺角地點搜尋、魚眼鏡頭決定與商業照明壓向住宅生活的環境脈絡；《漁獲》則把魚塘勞動、濕地保育、四張照片及香港觀鳥會的公開結果連在一起。
    links:
      - [閱讀《光染民居》項目, /zh-hant/projects/hong-kong-light-pollution/]
      - [閱讀香港魚塘保育項目, /zh-hant/projects/hong-kong-fishpond-conservation/]
      - [閱讀藝術家自述, /zh-hant/artist-statement/]
  press/cv:
    title: 藝術家履歷 CV
    label: 策展、媒體與機構資料
    summary: 郭文棣 Ricky Kwok，ARPS，香港藝術及紀實攝影師；創作橫跨觀察公共生活與建構式攝影棚實驗。
    image: /assets/optimized-v2/art/light-encroached-homes-1280.webp
    sections:
      - heading: 個人資料與創作實踐
        paragraphs:
          - 郭文棣（Ricky Kwok / Kwok Man Tai）是香港藝術及紀實攝影師。主要系列包括 Ritual、Collision、Motion 與 City Light，並持續整理香港光污染、魚塘保育、尼泊爾紀實及其他具公共脈絡的攝影項目。
          - 基地：香港。專業殊榮：英國皇家攝影學會會士級別之一 Associate of the Royal Photographic Society（ARPS）。ARPS 屬專業殊榮，並不計入攝影比賽獎項數目。
      - heading: 精選公開認可
        paragraphs:
          - 2015 Sony World Photography Awards：Commended, Youth, Culture；2014 National Geographic Channel Nat Geo Awards 攝影及紀錄片比賽中學組冠軍《整整有條》；2014 香港大學光污染攝影比賽冠軍《光染民居》；2013 Harbour Business Forum「Our Harbour」攝影比賽 School Group—Ships and Boats 第一名；2014 香港觀鳥會「香港有漁塘」攝影比賽共四項學生組別成績。
          - 其他可公開追溯紀錄、準確組別、作品名稱與原始來源列於完整獎項頁；未有足夠主辦機構資料或證書支持的舊紀錄，不會混入已核實清單。
      - heading: 展覽、出版與聯絡
        paragraphs:
          - 展覽、出版、訪問、授權及收藏查詢請使用結構化表格，並提供場地、日期、媒體、作品、用途及截止時間。媒體頁提供核准簡歷、圖說、版權標示和預覽圖片。
    links:
      - [查看完整獎項及來源, /zh-hant/awards/]
      - [下載及媒體資料, /zh-hant/press/media-kit/]
      - [聯絡工作室, /zh-hant/contact/]
