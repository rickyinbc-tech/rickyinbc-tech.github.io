    image: /assets/optimized-v2/art/light-encroached-homes-1280.webp
    sections:
      - heading: 預覽圖片不是出版許可
        paragraphs:
          - 網頁圖片只供初步編輯及策展審閱。出版解像度檔案必須在用途、媒體、地區、期限、發行量、修改方式與署名獲書面確認後提供。
          - 標準署名：Photograph © Ricky Kwok. Courtesy of the artist. 如獲提供作品年份、地點及完整雙語標題，出版時應一併保留。
      - heading: 三張優先媒體影像
        paragraphs:
          - 《光染民居 / Light Encroached Homes》，香港旺角，2014，City Light 系列；香港大學光污染攝影比賽2014冠軍，從154份作品中獲選。《漁獲 / Fishpond Harvest》，香港，2014，香港魚塘保育紀實。《綠色星體 / Green Orb》，Collision 系列藝術攝影作品。
      - heading: 權利限制
        paragraphs:
          - 未經書面同意，不得裁切、修改、再授權、出售、加入圖片庫、用於人工智能訓練，或製作合成衍生影像。教育、檔案與非牟利用途亦應先說明具體使用情境。
    links:
