        paragraphs:
          - 除非另有說明，網站所有照片、文字、圖說、標記及可下載資料的版權均屬 Ricky Kwok。觀看或下載預覽不會轉移擁有權，也不構成複製、修改、分發、人工智能訓練或建立衍生作品的許可。
      - heading: 查詢不是訂單或授權
        paragraphs:
          - 提交表格只是要求資料，並非購買、預留、展覽預約、授權或複製許可。書面報價或協議必須清楚列明作品、權利、價格、期限及條件。
