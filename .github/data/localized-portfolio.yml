  privacy:
    title: 私隱通知
    label: 2026年7月10日起生效
    summary: 說明 rickykwok.com 如何處理網站、收藏、展覽、媒體及圖片授權表格所收集的資料。
    image: /assets/optimized-v2/art/hong-kong-cranes-monochrome-1280.webp
    sections:
      - heading: 只收集理解、回覆及記錄查詢所需的資料
        paragraphs:
          - 提交表格時，工作室會收到你輸入的姓名、電郵、機構、相關作品、預定用途、期限、預算範圍及訊息。系統亦會記錄查詢編號、提交頁、首次進入頁與可用來源資料，以便處理及歸因。
          - 請勿提交信用卡資料、身份文件、醫療資料、密碼、機密來源或其他敏感個人資料。本網站不設帳戶註冊或網上付款結帳。
      - heading: 使用、披露與服務供應商
        paragraphs:
          - 查詢資料只用於直接工作室溝通、交易、展覽、出版、權利與必要業務紀錄，不會因一次查詢而自動把你加入電子通訊名單。
          - 表格可由 FormSubmit 處理及傳送至 studio@rickykwok.com；該服務表示提交檔案保留30日。防濫用程序可能使用 Google reCAPTCHA。網站使用 Google Analytics 量度頁面及查詢漏斗，但不會刻意把姓名、電郵、訊息、查詢編號或表格內容作為分析事件參數傳送。
      - heading: 保留、瀏覽器儲存與你的要求
        paragraphs:
          - 瀏覽器 session storage 只在目前分頁工作階段保存已清理的進入頁、來源、查詢編號、類型、作品脈絡及提交時間，不保存姓名、電郵、機構或訊息。電郵與工作室紀錄只會按查詢、交易、權利、稅務、爭議或法律需要保留。
          - 你可要求查閱、更正或刪除工作室持有的個人資料，但依法、權利管理、安全或交易需要合理保留的紀錄除外。任何互聯網傳送或電郵系統均不能保證絕對安全，請只提供處理要求所需的資料。
