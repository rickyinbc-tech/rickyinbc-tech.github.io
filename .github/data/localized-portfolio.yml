      - heading: 負責任使用與相關政策
        paragraphs:
          - 不得利用網站提交違法、誹謗、欺騙、自動化或濫用要求；亦不要透過表格傳送信用卡、身份文件、密碼或機密資料。私隱、運送、退貨、收藏與授權詳情應在相應路徑及最終書面協議確認。
